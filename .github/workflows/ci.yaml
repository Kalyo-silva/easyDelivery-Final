name: EasyDelivery CI - Validação do commit

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pegar codigo do commit
        uses: actions/checkout@v6

      - name: iniciar o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: instalar dependências
        run : npm install
      
      - name: Valida sintaxe da API
        run : npm run check
      
      - name: Realiza Linting da API 
        run : npm run lint

      - name: Executa os Testes unitários
        run : npm test

      - name: Faz o Build da Imagem Docker
        run : docker build -t EasyDelivery-API .